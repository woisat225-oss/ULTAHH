<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD Aissya Nathaniaaa!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght=700&family=Poppins:wght=300;400;600&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: radial-gradient(circle, #1a1a2e 0%, #0f0f1b 100%);
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Background Canvas */
        #canvas-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Container Utama */
        .main-container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 600px;
            perspective: 1000px;
        }

        /* --- SCREEN 1: AMPLOP INTERAKTIF --- */
        .envelope-wrapper {
            width: 100%;
            height: 380px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.5s ease, opacity 0.5s ease;
        }

        .envelope-wrapper:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: #ff758c;
        }

        .stamp {
            font-size: 4rem;
            animation: pulse 2s infinite;
            filter: drop-shadow(0 0 15px #ff758c);
        }

        .click-hint {
            margin-top: 20px;
            font-size: 0.9rem;
            letter-spacing: 2px;
            color: #ff758c;
            text-transform: uppercase;
            animation: blink 1.5s infinite;
        }

        /* --- SCREEN 2: MAIN CARD --- */
        .card {
            background: rgba(15, 15, 27, 0.85);
            border-radius: 24px;
            padding: 40px 25px;
            border: 1px solid rgba(255, 117, 140, 0.3);
            backdrop-filter: blur(20px);
            box-shadow: 0 0 40px rgba(255, 117, 140, 0.15);
            text-align: center;
            display: none;
            opacity: 0;
            transform: scale(0.8) rotateY(10deg);
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card.reveal {
            display: block;
            opacity: 1;
            transform: scale(1) rotateY(0deg);
        }

        .interactive-name {
            font-family: 'Dancing Script', cursive;
            font-size: 2.3rem;
            color: #ff758c;
            margin-bottom: 10px;
            cursor: pointer;
            display: inline-block;
            transition: transform 0.3s;
            text-shadow: 0 0 10px rgba(255, 117, 140, 0.5);
        }

        .interactive-name:hover {
            transform: scale(1.05);
            color: #ff7eb3;
        }

        .from-badge {
            display: inline-block;
            background: linear-gradient(45deg, #ff758c, #ff7eb3);
            padding: 5px 20px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(255, 117, 140, 0.4);
        }

        /* Typing Effect Container */
        .message-box {
            min-height: 250px;
            font-size: 0.95rem;
            line-height: 1.8;
            color: #e0e0e0;
            text-align: left;
            background: rgba(255, 255, 255, 0.02);
            padding: 20px;
            border-radius: 12px;
            border-left: 3px solid #ff758c;
            margin-bottom: 25px;
            overflow-y: auto;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            background-color: #ff758c;
            animation: blink 0.8s infinite;
        }

        .floating-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 12px 28px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .floating-btn:hover {
            background: #ffffff;
            color: #0f0f1b;
            box-shadow: 0 0 20px rgba(255,255,255,0.4);
        }

        /* Audio Control */
        .audio-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* --- ANIMATIONS --- */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 25px #ff7eb3); }
            100% { transform: scale(1); }
        }

        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- Background Particle Canvas -->
    <canvas id="canvas-particles"></canvas>

    <!-- Tombol Musik Mute/Unmute -->
    <div class="audio-control" onclick="toggleMusicState()">
        <span id="music-icon">⏸️</span>
    </div>

    <div class="main-container">
        
        <!-- SCREEN 1: Amplop -->
        <div class="envelope-wrapper" id="envelope" onclick="openEnvelope()">
            <div class="stamp">💌</div>
            <p style="margin-top: 15px; color: #aaa; font-size: 0.9rem;">Suratt spesialll buattt kamuu...</p>
            <div class="click-hint">Klikkk untukkk membukaaa</div>
        </div>

        <!-- SCREEN 2: Surat Utama -->
        <div class="card" id="birthday-card">
            <h1 class="interactive-name" id="target-name">Aissya Nathania Cahya Dewiii</h1>
            <div>
                <span class="from-badge">frommm fachryyy</span>
            </div>
            
            <!-- Box Surat Mengetik Otomatis -->
            <div class="message-box">
                <span id="typing-text"></span><span class="cursor">|</span>
            </div>

            <button class="floating-btn" onclick="makeItRain()">Bikinnn Surpriseee! ✨💛</button>
        </div>

    </div>

    <script>
        // --- DATA TEKS UCAPAN DARI FACHRY ---
        const kalimatUcapan = [
            "HAPPY BIRTHDAY SAYANGGG 🥳❤️",
            "",
            "selamattt harii lahirr dann selamattt bertumbuh jauhh lebihh baikk sayanggku cintaakuu duniaa nyaa fachryy!!💛💛",
            "yeayy pacalll akuu 18 tahunn",
            "kamuu sudaa dewasaa sayanggg, alwaysss sehatt yaww sayanggg, semogaa banyakk kebahagiaan yang datengg buatt kitaa berduaa dii depann sanaa sayanggg",
            "",
            "wish for u on ur birthdayyy....and semoga apapun yang kamu mau bakall terpenuhi satuu persatuu dii waktuu yangg tepatt sayanggg, akuu berharapp dann berdoaa buatt kamuu di harii ulang tahunn kamu yangg ke 18 inii semogaa kamuu dikasihh kesehatann kelancarann, rezekii yangg banyakk dann kelapangan dada, kesabarann buatt ngadepinn sifatt, perbuatann pacall kamuu inii fachryyy luthfiansyah...",
            "",
            "semoga allah membuatt semuaaa yangg kamuu inginkann baikk buatt kamuu sayangggg, dan dapat menerima semuaa doa dann keinginann kamuu sayangggg, terimakasihh sudaa mauu menerimaa akuu dann kekurangann akuu semuaa inii yawww",
            "wishh selebihnyaa kamuu sendirii yaa sayaang, make a wish sayang? ituu kamuu ucapin diii dalem hatii kamuu sendirii yaw sayanggkuuu",
            "",
            "i loveeeee uuuu sooo muchh sayangggg 🥰✨"
        ];

        // --- BACKGROUND PARTICLES ENGINE ---
        const canvas = document.getElementById('canvas-particles');
        const ctx = canvas.getContext('2d');
        let particlesArray = [];

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * -1 - 0.2;
                this.color = `rgba(255, ${Math.random() * 100 + 120}, ${Math.random() * 50 + 150}, ${Math.random() * 0.6})`;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.y < 0) {
                    this.y = canvas.height;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            for (let i = 0; i < 70; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animateParticles);
        }

        initParticles();
        animateParticles();


        // --- REAL SYNTHESIZER MUSIC BOX ENGINE (100% GARANSI BUNYI) ---
        let audioCtx = null;
        let isMuted = false;
        let melodyTimeout = null;

        // Nada lagu Happy Birthday (C4=261.63, D4=293.66, dst)
        const notes = {
            'C4': 261.63, 'D4': 293.66, 'E4': 329.63, 'F4': 349.23, 
            'G4': 392.00, 'A4': 440.00, 'B4': 493.88, 'C5': 523.25
        };

        const happyBirthdayMelody = [
            { note: 'C4', duration: 0.4 }, { note: 'C4', duration: 0.2 },
            { note: 'D4', duration: 0.6 }, { note: 'C4', duration: 0.6 },
            { note: 'F4', duration: 0.6 }, { note: 'E4', duration: 1.0 },
            
            { note: 'C4', duration: 0.4 }, { note: 'C4', duration: 0.2 },
            { note: 'D4', duration: 0.6 }, { note: 'C4', duration: 0.6 },
            { note: 'G4', duration: 0.6 }, { note: 'F4', duration: 1.0 },
            
            { note: 'C4', duration: 0.4 }, { note: 'C4', duration: 0.2 },
            { note: 'C5', duration: 0.6 }, { note: 'A4', duration: 0.6 },
            { note: 'F4', duration: 0.6 }, { note: 'E4', duration: 0.6 },
            { note: 'D4', duration: 0.6 },
            
            { note: 'B4', duration: 0.4 }, { note: 'B4', duration: 0.2 },
            { note: 'A4', duration: 0.6 }, { note: 'F4', duration: 0.6 },
            { note: 'G4', duration: 0.6 }, { note: 'F4', duration: 1.2 }
        ];

        function playNote(frequency, duration) {
            if (isMuted || !audioCtx) return;

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            // Pakai tipe 'triangle' biar dapet efek lembut menyerupai suara ting-ting kotak musik
            osc.type = 'triangle'; 
            osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);

            // Efek suara meluruh (decay) khas musik box lembut
            gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);

            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        let currentNoteIndex = 0;
        function playMelodyLoop() {
            if (isMuted) return;
            
            const current = happyBirthdayMelody[currentNoteIndex];
            playNote(notes[current.note], current.duration);

            currentNoteIndex = (currentNoteIndex + 1) % happyBirthdayMelody.length;
            
            // Jeda antar nada dibuat konstan
            melodyTimeout = setTimeout(playMelodyLoop, current.duration * 900);
        }

        function startMusic() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            currentNoteIndex = 0;
            playMelodyLoop();
        }

        function toggleMusicState() {
            if (!isMuted) {
                isMuted = true;
                clearTimeout(melodyTimeout);
                document.getElementById('music-icon').innerText = "🎵";
            } else {
                isMuted = false;
                document.getElementById('music-icon').innerText = "⏸️";
                if(audioCtx) playMelodyLoop();
            }
        }


        // --- INTERACTION LOGIC ---
        function openEnvelope() {
            // Aktifkan engine suara digital langsung pas klik
            startMusic();

            const envelope = document.getElementById('envelope');
            const card = document.getElementById('birthday-card');
            
            envelope.style.opacity = '0';
            envelope.style.transform = 'scale(0.8) translateY(-50px)';
            
            setTimeout(() => {
                envelope.style.display = 'none';
                card.classList.add('reveal');
                setTimeout(startTyping, 1000);
            }, 500);
        }

        // --- AUTOMATIC TYPING ENGINE ---
        let lineIndex = 0;
        let charIndex = 0;
        const typingSpeed = 45; 
        const lineDelay = 1200; 
        const typingTarget = document.getElementById('typing-text');
        const messageBox = document.querySelector('.message-box');

        function startTyping() {
            if (lineIndex < kalimatUcapan.length) {
                if (charIndex < kalimatUcapan[lineIndex].length) {
                    typingTarget.innerHTML += kalimatUcapan[lineIndex].charAt(charIndex);
                    charIndex++;
                    messageBox.scrollTop = messageBox.scrollHeight;
                    setTimeout(startTyping, typingSpeed);
                } else {
                    setTimeout(() => {
                        typingTarget.innerHTML += "<br/>";
                        lineIndex++;
                        charIndex = 0;
                        startTyping();
                    }, lineDelay);
                }
            }
        }

        // --- SURPRISE RAIN EFFECT ---
        function makeItRain() {
            for (let i = 0; i < 60; i++) {
                setTimeout(() => {
                    const drop = document.createElement('div');
                    drop.innerText = ['💛', '❤️', '✨', '🎉', '🌸'][Math.floor(Math.random() * 5)];
                    drop.style.position = 'fixed';
                    drop.style.left = Math.random() * 100 + 'vw';
                    drop.style.top = '-20px';
                    drop.style.fontSize = Math.random() * 20 + 15 + 'px';
                    drop.style.zIndex = '999';
                    drop.style.pointerEvents = 'none';
                    drop.style.transition = 'transform 3s linear, opacity 3s linear';
                    
                    document.body.appendChild(drop);

                    setTimeout(() => {
                        drop.style.transform = `translateY(${window.innerHeight + 50}px) translateX(${Math.random() * 100 - 50}px) rotate(${Math.random() * 360}deg)`;
                        drop.style.opacity = '0';
                    }, 100);

                    setTimeout(() => {
                        drop.remove();
                    }, 3100);
                }, i * 60);
            }
        }
    </script>
</body>
</html>
